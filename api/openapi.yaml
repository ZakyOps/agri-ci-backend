openapi: 3.0.3
info:
  title: Agri CI API
  version: 0.1.0
  description: API REST pour la plateforme agricole Agri CI.
servers:
  - url: http://localhost:8000/api
security:
  - sanctum: []
components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: operator.abidjan@agrici.ci
        password:
          type: string
          example: password
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, supervisor, operator]
        supervisor_id:
          type: integer
          nullable: true
    UserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Awa Kouame
        email:
          type: string
          format: email
          example: supervisor.abidjan@agrici.ci
        password:
          type: string
          example: password
        supervisor_id:
          type: integer
          nullable: true
          description: Requis pour la creation d'un operateur.
    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        name:
          type: string
        slug:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Product:
      type: object
      properties:
        id:
          type: integer
        category_id:
          type: integer
        name:
          type: string
        price_fcfa:
          type: integer
        description:
          type: string
        is_active:
          type: boolean
    CategoryRequest:
      type: object
      required: [name]
      properties:
        parent_id:
          type: integer
          nullable: true
        name:
          type: string
          example: Herbicides
        slug:
          type: string
          nullable: true
    ProductRequest:
      type: object
      required: [category_id, name, price_fcfa, description]
      properties:
        category_id:
          type: integer
        name:
          type: string
          example: Semences Mais Jaune 5kg
        price_fcfa:
          type: integer
          example: 12000
        description:
          type: string
        is_active:
          type: boolean
          default: true
    Farmer:
      type: object
      properties:
        id:
          type: integer
        identifier:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        phone:
          type: string
        credit_limit_fcfa:
          type: integer
        outstanding_debt_fcfa:
          type: integer
    FarmerRequest:
      type: object
      required: [identifier, firstname, lastname, phone, credit_limit_fcfa]
      properties:
        identifier:
          type: string
          example: FCI-0005
        firstname:
          type: string
          example: Koffi
        lastname:
          type: string
          example: Bedia
        phone:
          type: string
          example: "+2250705050505"
        credit_limit_fcfa:
          type: integer
          example: 50000
    Setting:
      type: object
      properties:
        key:
          type: string
          example: credit_interest_rate
        value:
          type: string
          example: "0.30"
        description:
          type: string
    TransactionRequest:
      type: object
      required: [farmer_id, payment_method, items]
      example:
        farmer_id: 1
        payment_method: credit
        items:
          - product_id: 8
            quantity: 1
      properties:
        farmer_id:
          type: integer
        payment_method:
          type: string
          enum: [cash, credit]
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: integer
              quantity:
                type: integer
                minimum: 1
    RepaymentRequest:
      type: object
      required: [farmer_id, commodity_kg]
      example:
        farmer_id: 2
        commodity_kg: 20
      properties:
        farmer_id:
          type: integer
        commodity_kg:
          type: number
          minimum: 0.01
paths:
  /auth/login:
    post:
      security: []
      summary: Connexion et reception du token Sanctum
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion reussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                success: true
                data:
                  token: "1|example-sanctum-token"
                  user:
                    id: 4
                    name: "Koffi N'Guessan"
                    email: operator.abidjan@agrici.ci
                    role: operator
                    supervisor_id: 2
        '422':
          description: Erreur de validation
  /auth/logout:
    post:
      summary: Revoquer le token courant
      responses:
        '200':
          description: Deconnexion reussie
  /auth/me:
    get:
      summary: Utilisateur connecte
      responses:
        '200':
          description: Utilisateur courant
  /categories:
    get:
      summary: Lister les categories imbriquees
      responses:
        '200':
          description: Arbre des categories
    post:
      summary: Creer une categorie
      description: Reserve aux roles administrateur et superviseur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Cree
  /categories/{id}:
    get:
      summary: Afficher une categorie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categorie
    put:
      summary: Modifier une categorie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Modifie
    delete:
      summary: Supprimer une categorie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Supprime
  /products:
    get:
      summary: Lister les produits
      responses:
        '200':
          description: Liste des produits
    post:
      summary: Creer un produit
      description: Reserve aux roles administrateur et superviseur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Cree
  /products/{id}:
    get:
      summary: Afficher un produit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produit
    put:
      summary: Modifier un produit
      description: Reserve aux roles administrateur et superviseur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Modifie
    delete:
      summary: Supprimer un produit
      description: Reserve aux roles administrateur et superviseur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Supprime
  /farmers/search:
    get:
      summary: Rechercher un agriculteur par identifiant ou telephone
      parameters:
        - name: query
          in: query
          required: true
          example: FCI-0001
          schema:
            type: string
      responses:
        '200':
          description: Resultats de recherche
          content:
            application/json:
              example:
                success: true
                data:
                  - id: 1
                    identifier: FCI-0001
                    firstname: Jean
                    lastname: Kouadio
                    phone: "+2250701010101"
                    credit_limit_fcfa: 100000
                    outstanding_debt_fcfa: 0
  /farmers:
    get:
      summary: Lister les agriculteurs
      responses:
        '200':
          description: Liste des agriculteurs
    post:
      summary: Creer un agriculteur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FarmerRequest'
      responses:
        '201':
          description: Cree
  /farmers/{id}:
    get:
      summary: Afficher un agriculteur avec resume de dette
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Agriculteur
    put:
      summary: Modifier un agriculteur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FarmerRequest'
      responses:
        '200':
          description: Modifie
  /farmers/{id}/debts:
    get:
      summary: Dettes en cours d'un agriculteur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des dettes
  /farmers/{id}/repayments:
    get:
      summary: Remboursements d'un agriculteur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des remboursements
  /transactions:
    post:
      summary: Creer une transaction en especes ou a credit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Transaction creee
          content:
            application/json:
              example:
                success: true
                data:
                  id: 12
                  farmer_id: 1
                  operator_id: 4
                  total_fcfa: 12000
                  payment_method: credit
                  interest_rate: 0.3
                  interest_amount_fcfa: 3600
                  credited_total_fcfa: 15600
                  status: open
        '422':
          description: Erreur de validation ou de limite de credit
          content:
            application/json:
              example:
                message: "La limite de crédit de cet agriculteur serait dépassée."
                errors:
                  credit_limit:
                    - "La limite de crédit de cet agriculteur serait dépassée."
  /transactions/{id}:
    get:
      summary: Afficher une transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Transaction
  /repayments:
    post:
      summary: Enregistrer un remboursement en marchandise avec FIFO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepaymentRequest'
      responses:
        '201':
          description: Remboursement enregistre
          content:
            application/json:
              example:
                success: true
                data:
                  id: 5
                  farmer_id: 2
                  operator_id: 4
                  commodity_kg: 20
                  rate_fcfa_per_kg: 1000
                  value_fcfa: 20000
                  allocations:
                    - debt_id: 1
                      amount_fcfa: 13000
                    - debt_id: 2
                      amount_fcfa: 7000
        '422':
          description: Erreur de validation
  /supervisors:
    get:
      summary: Lister les superviseurs
      description: Reserve au role administrateur.
      responses:
        '200':
          description: Liste des superviseurs
    post:
      summary: Creer un superviseur
      description: Reserve au role administrateur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Cree
  /supervisors/{id}:
    get:
      summary: Afficher un superviseur
      description: Reserve au role administrateur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Superviseur
    put:
      summary: Modifier un superviseur
      description: Reserve au role administrateur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Modifie
    delete:
      summary: Supprimer un superviseur
      description: Reserve au role administrateur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Supprime
  /operators:
    get:
      summary: Lister les operateurs
      description: Reserve au role superviseur.
      responses:
        '200':
          description: Liste des operateurs
    post:
      summary: Creer un operateur
      description: Reserve au role superviseur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Cree
  /operators/{id}:
    get:
      summary: Afficher un operateur
      description: Reserve au role superviseur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Operateur
    put:
      summary: Modifier un operateur
      description: Reserve au role superviseur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Modifie
    delete:
      summary: Supprimer un operateur
      description: Reserve au role superviseur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Supprime
  /settings:
    get:
      summary: Lister les parametres metier
      description: Reserve aux roles administrateur et superviseur.
      responses:
        '200':
          description: Parametres
  /settings/{key}:
    put:
      summary: Modifier un parametre metier
      description: Reserve aux roles administrateur et superviseur.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            enum: [credit_interest_rate, commodity_rate_fcfa_per_kg]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
                  example: "0.30"
      responses:
        '200':
          description: Modifie
